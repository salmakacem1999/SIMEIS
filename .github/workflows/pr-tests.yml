name: PR Tests

on:
  pull_request:

# Cancel previous run if a new commit is pushed on the same PR
concurrency:
  group: pr-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # Install cargo-tarpaulin for Rust code coverage
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      # Run tests and generate JSON coverage report
      - name: Run coverage
        run: cargo tarpaulin --features testing --out Json --output-dir coverage/

      # Read coverage % and add label if below 50%
      - name: Check coverage threshold
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COVERAGE=$(python3 -c "
          import json
          with open('coverage/tarpaulin-report.json') as f:
              data = json.load(f)
          cov = data.get('coverage', 0)
          if cov <= 1.0:
              cov = cov * 100
          print(f'{cov:.2f}')
          ")
          echo "Coverage: ${COVERAGE}%"
          if python3 -c "exit(0 if float('${COVERAGE}') < 50 else 1)"; then
            echo "Coverage below 50%, adding label"
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "not enough tests"
          else
            echo "Coverage OK, removing label if present"
            gh pr edit "${{ github.event.pull_request.number }}" --remove-label "not enough tests" 2>/dev/null || true
          fi

  property-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python 3 is already available on ubuntu-latest
      # Quick mode: ~3s per test (no --heavy flag)
      - name: Run property-based tests (quick mode)
        run: python3 tests/propertybased.py