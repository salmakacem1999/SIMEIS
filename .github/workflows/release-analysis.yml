name: Release Advanced Analysis

on:
  push:
    branches:
      - "release/*"

jobs:
  advanced-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust
        run: rustup update stable

      - name: Tests avec heavy-testing
        run: cargo test --features heavy-testing

      - name: Build debug avec heavy-testing
        run: cargo build --features heavy-testing

      - name: Installer Python
        run: pip install requests

      - name: Lancer le serveur en arrière-plan
        run: |
          cargo run --features testing &
          echo $! > server.pid

      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 20); do
            curl -s http://localhost:9345/ && break || true
            sleep 1
          done

      - name: Tests fonctionnels Python
        run: python tests/functional_tests.py

      - name: Arrêter le serveur
        if: always()
        run: kill $(cat server.pid) || true

      - name: cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: cargo-udeps
        run: |
          rustup toolchain install nightly
          cargo +nightly install cargo-udeps
          cargo +nightly udeps