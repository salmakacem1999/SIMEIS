name: Release

# Déclenché à chaque merge (= push) sur une branche release/x,
# même évènement que release-analysis.yml déjà présent dans le repo
on:
  push:
    branches:
      - "release/*"

permissions:
  contents: write      # nécessaire pour créer/modifier une release GitHub
  pull-requests: read  # nécessaire pour lister les PR via gh pr list

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet : nécessaire pour retrouver les tags précédents

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: rustup update stable

      # --- 1. Déterminer le tag de la release à partir du nom de la branche ---
      # release/1.0 -> v1.0
      - name: Déterminer le tag de la release
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=v$BRANCH" >> "$GITHUB_OUTPUT"

      # --- 2. Compiler le binaire et préparer l'artefact ---
      - name: Build release
        run: make release

      - name: Préparer l'archive du binaire
        run: |
          mkdir -p dist
          tar -czf "dist/simeis-server-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz" \
            -C target/release simeis-server

      # --- 2bis. Construire le paquet Debian (.deb) ---
      - name: Installer fakeroot
        run: sudo apt-get update -qq && sudo apt-get install -y fakeroot

      - name: Construire le paquet Debian
        run: |
          # Version Debian : "v1.2" -> "1.2-1" (upstream_version-debian_revision)
          DEB_VERSION="${{ steps.version.outputs.tag }}"
          DEB_VERSION="${DEB_VERSION#v}-1"

          # Arborescence de staging temporaire (≠ packaging/debian/ qui ne
          # contient que les fichiers sources versionnés dans le repo)
          mkdir -p pkgroot/DEBIAN pkgroot/usr/bin \
            pkgroot/usr/share/man/man8 pkgroot/etc/systemd/system

          # control avec la version substituée
          sed "s/VERSION_PLACEHOLDER/$DEB_VERSION/" \
            packaging/debian/control > pkgroot/DEBIAN/control

          # scripts de maintenance (création user système + service systemd)
          cp packaging/debian/postinst pkgroot/DEBIAN/postinst
          cp packaging/debian/prerm pkgroot/DEBIAN/prerm
          chmod 755 pkgroot/DEBIAN/postinst pkgroot/DEBIAN/prerm

          # binaire compilé à l'étape précédente
          cp target/release/simeis-server pkgroot/usr/bin/simeis-server
          chmod 755 pkgroot/usr/bin/simeis-server

          # page de man, compressée (convention Debian)
          gzip -9 -c packaging/debian/simeis-server.8 \
            > pkgroot/usr/share/man/man8/simeis-server.8.gz

          # unité systemd
          cp packaging/debian/simeis-server.service \
            pkgroot/etc/systemd/system/simeis-server.service

          find pkgroot -type d -exec chmod 755 {} \;

          fakeroot dpkg-deb --build pkgroot "dist/simeis_${DEB_VERSION}_amd64.deb"
      
      - name: Construire l'image Docker
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.tag }} \
            -t simeis-server:${{ steps.version.outputs.tag }} \
            -f .github/Dockerfile .
 
      - name: Tester l'image Docker
        run: |
          docker run -d --name simeis-test -p 8080:8080 simeis-server:${{ steps.version.outputs.tag }}
          sleep 3
          curl --fail http://localhost:8080/ || curl --fail --max-time 5 http://localhost:8080/status
          docker stop simeis-test
          docker rm simeis-test
 
      - name: Sauvegarder l'image Docker
        run: |
          docker image save simeis-server:${{ steps.version.outputs.tag }} \
            -o dist/simeis-server-${{ steps.version.outputs.tag }}-docker.tar
 
      - name: Uploader l'image Docker comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: simeis-docker-image-${{ steps.version.outputs.tag }}
          path: dist/simeis-server-${{ steps.version.outputs.tag }}-docker.tar
 
      - name: Pousser l'image sur DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker tag simeis-server:${{ steps.version.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:${{ steps.version.outputs.tag }}
          docker tag simeis-server:${{ steps.version.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:${{ steps.version.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:latest

      # --- 3. Générer le changelog à partir des PR mergées depuis la dernière release ---
      - name: Générer le changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag existant le plus récent (vide si c'est la toute première release)
          PREV_TAG=$(git tag --sort=-creatordate | head -n1)

          if [ -n "$PREV_TAG" ]; then
            SINCE=$(git log -1 --format=%aI "$PREV_TAG")
          else
            SINCE="2000-01-01T00:00:00"
          fi

          # PR mergées depuis cette date, avec leur branche source (pour les catégoriser)
          gh pr list --state merged --search "merged:>$SINCE" \
            --json number,title,url,headRefName --limit 200 > prs.json

          {
            echo "## Changements${PREV_TAG:+ depuis $PREV_TAG}"
            echo
            echo "### Features"
            jq -r '.[] | select(.headRefName | startswith("feature/")) | "- [\(.title)](\(.url))"' prs.json
            echo
            echo "### Bugfix"
            jq -r '.[] | select(.headRefName | startswith("bug/")) | "- [\(.title)](\(.url))"' prs.json
            echo
            echo "### Autre"
            jq -r '.[] | select(.headRefName | (startswith("feature/") or startswith("bug/")) | not) | "- [\(.title)](\(.url))"' prs.json
          } > changelog.md

          # On expose le contenu du changelog en output multiligne,
          # pour pouvoir le passer en "body" à l'action de release ci-dessous
          {
            echo "body<<EOF"
            cat changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # --- 4. Créer la release si elle n'existe pas encore, sinon la mettre à jour ---
      # (plusieurs PR peuvent merger successivement dans la même branche release/x)
      # Action recommandée par le sujet : crée OU met à jour automatiquement.
      - name: Créer ou mettre à jour la release GitHub
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.tar
          clear_attachments: true