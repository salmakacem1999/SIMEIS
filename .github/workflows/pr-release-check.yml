name: PR Release Branch Check

on:
  pull_request:
    branches:
      - "release/*"

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier que la source est main ou bug/*
        env:
          SOURCE: ${{ github.head_ref }}
        run: |
          if [[ "$SOURCE" == "main" || "$SOURCE" == bug/* ]]; then
            echo "Branche source autorisée : $SOURCE"
            exit 0
          fi

          # Source non autorisée : on fail pour bloquer le merge
          echo "Branche source non autorisée : $SOURCE"
          echo "Seules main ou bug/* peuvent merger dans release/*"
          exit 1