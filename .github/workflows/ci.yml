# Workflow CI pour Simeis
name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Récupérer le code
      - uses: actions/checkout@v4

      # Installer Rust
      - name: Installer Rust
        run: rustup update stable

      # Si merge dans main : build release + doc
      - name: Build release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          make release
          make manual

      # Sinon : checks et tests
      - name: Dev checks
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        run: |
          make check
          make test